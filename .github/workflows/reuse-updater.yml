name: Update REUSE Headers

on:
  pull_request_target:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: write
  pull-requests: read

concurrency:
  group: reuse-headers-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  update_headers:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout pull request head
        uses: actions/checkout@v4
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
          token: ${{ secrets.BOT_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Select requested license
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          license=$(printf '%s\n' "$PR_BODY" | sed -nE 's/^[[:space:]]*LICENSE:[[:space:]]*(AGPL-3.0-or-later|AGPL|MIT|MPL-2.0-No-Copyleft|MPL-2.0|MPL)[[:space:]]*$/\1/ip' | head -n 1)
          case "${license,,}" in
            agpl|agpl-3.0-or-later|"") label=agpl ;;
            mit) label=mit ;;
            mpl|mpl-2.0) label=mpl ;;
            mpl-2.0-no-copyleft) label=mpl-no-copyleft ;;
          esac
          echo "PR_LICENSE=$label" >> "$GITHUB_ENV"

      - name: Load trusted updater from the base branch
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          BASE_REPO: ${{ github.event.pull_request.base.repo.full_name }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: |
          set -euo pipefail

          curl --fail --silent --show-error --location \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github.raw+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "$GITHUB_API_URL/repos/$BASE_REPO/contents/Tools/update_pr_reuse_headers.py?ref=$BASE_SHA" \
            --output "$RUNNER_TEMP/update_pr_reuse_headers.py"

      - name: Update REUSE headers
        run: |
          python "$RUNNER_TEMP/update_pr_reuse_headers.py" \
            --pr-license "$PR_LICENSE" \
            --pr-base-sha "${{ github.event.pull_request.base.sha }}" \
            --pr-head-sha "${{ github.event.pull_request.head.sha }}" \
            --pr-author-name "${{ github.event.pull_request.user.login }}" \
            --pr-author-email "${{ github.event.pull_request.user.id }}+${{ github.event.pull_request.user.login }}@users.noreply.github.com"

      - name: Require maintainer edits for external fork
        if: github.event.pull_request.head.repo.full_name != github.repository && github.event.pull_request.maintainer_can_modify != true
        run: |
          echo "The pull request author must enable 'Allow edits from maintainers' before REUSE headers can be pushed to the fork." >&2
          exit 1

      - name: Commit changes
        if: github.event.pull_request.head.repo.full_name == github.repository || github.event.pull_request.maintainer_can_modify == true
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: Automatically update REUSE headers"
          commit_user_name: ${{ github.event.pull_request.user.login }}
          commit_user_email: ${{ github.event.pull_request.user.id }}+${{ github.event.pull_request.user.login }}@users.noreply.github.com
          commit_author: "${{ github.event.pull_request.user.login }} <${{ github.event.pull_request.user.id }}+${{ github.event.pull_request.user.login }}@users.noreply.github.com>"
          branch: ${{ github.event.pull_request.head.ref }}
          skip_dirty_check: false
          skip_fetch: true
