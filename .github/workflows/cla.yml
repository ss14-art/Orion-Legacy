name: "CLA Assistant"
on:
  issue_comment:
    types: [created]
  pull_request_target:
    types: [opened,closed,synchronize]

# explicitly configure permissions, in case your GITHUB_TOKEN workflow permissions are set to read-only in repository settings
permissions:
  actions: write
  contents: write # this can be 'read' if the signatures are in remote repository
  pull-requests: write
  statuses: write

jobs:
  CLAAssistant:
    runs-on: ubuntu-latest
    steps:
      - name: "Generate Orion GitHub App token"
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ vars.ORION_APP_ID }}
          private-key: ${{ secrets.ORION_APP_PRIVATE_KEY }}

      - name: "CLA Assistant"
        if: >-
          (github.event.comment.body == 'recheck' ||
          github.event.comment.body == 'Я прочитал Contributor License Agreement и принимаю его условия') ||
          github.event_name == 'pull_request_target'
        uses: contributor-assistant/github-action@v2.6.1
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
          # the below token should have repo scope and must be manually added by you in the repository's secret
          # This token is required only if you have configured to store the signatures in a remote repository/organization
          # PERSONAL_ACCESS_TOKEN: ${{ secrets.PERSONAL_ACCESS_TOKEN }}
        with:
          path-to-signatures: "signatures/orion/version1/cla.json"
          path-to-document: "https://github.com/AtaraxiaSpaceFoundation/Orion-Station/blob/master/CLA.md" # e.g. a CLA or a DCO document
          # branch should not be protected
          branch: "master"
          allowlist: GoobAutomatedBot
          create-file-commit-message: "[Tweak] Create CLA Signs"
          signed-commit-message: >-
            @$contributorName принял CLA в
            $owner/$repo#${{ github.event.pull_request.number || github.event.issue.number }}
          custom-pr-sign-comment: "Я прочитал Contributor License Agreement и принимаю его условия"
          custom-notsigned-prcomment: |
            Спасибо за вклад в Orion Station!

            Перед объединением Pull Request все его участники должны принять Contributor License Agreement Ataraxia Space Foundation.

            Ознакомьтесь с документом:
            [Contributor License Agreement](https://github.com/AtaraxiaSpaceFoundation/Orion-Station/blob/master/CLA.md)

            Чтобы принять соглашение, скопируйте текст ниже и отправьте его отдельным комментарием.
          custom-allsigned-prcomment: |
            ✅ Все участники этого Pull Request приняли Contributor License Agreement.
          lock-pullrequest-aftermerge: false

         # the followings are the optional inputs - If the optional inputs are not given, then default values will be taken
          #remote-organization-name: enter the remote organization name where the signatures should be stored (Default is storing the signatures in the same repository)
          #remote-repository-name: enter the  remote repository name where the signatures should be stored (Default is storing the signatures in the same repository)
          #create-file-commit-message: 'For example: Creating file for storing CLA Signatures'
          #signed-commit-message: 'For example: $contributorName has signed the CLA in $owner/$repo#$pullRequestNo'
          #custom-notsigned-prcomment: 'pull request comment with Introductory message to ask new contributors to sign'
          #custom-pr-sign-comment: 'The signature to be committed in order to sign the CLA'
          #custom-allsigned-prcomment: 'pull request comment when all contributors has signed, defaults to **CLA Assistant Lite bot** All Contributors have signed the CLA.'
          #lock-pullrequest-aftermerge: false - if you don't want this bot to automatically lock the pull request after merging (default - true)
          #use-dco-flag: true - If you are using DCO instead of CLA
