- type: entity
  parent: BaseItem
  id: EnergyDomeGeneratorPersonalSyndie
  name: blood red personal shield generator
  description: A personal shield generator that protects the wearer from lasers and bullets but prevents from using ranged weapons himself. Uses a power cell.
  components:
  - type: Item
    size: Ginormous
  - type: Clothing
    quickEquip: false
    slots:
    - Belt
  - type: Sprite
    sprite: _Orion/Objects/Shields/EnergyDome/syndie.rsi
    layers:
      - state: icon
  - type: ContainerContainer
    containers:
      cell_slot: !type:ContainerSlot
  - type: PowerCellSlot
    cellSlotId: cell_slot
  - type: ItemSlots
    slots:
      cell_slot:
        name: power-cell-slot-component-slot-name-default
        startingItem: PowerCellHigh
        whitelist:
          tags:
            - PowerCell
            - PowerCellSmall
  - type: EnergyDomeGenerator
    damageEnergyDraw: 8
    domePrototype: EnergyDomeSmallRed
  - type: PowerCellDraw
    drawRate: 0
    useCharge: 0
  - type: UseDelay
    delay: 10.0

- type: entity
  parent: BaseItem
  id: EnergyDomeTurtle
  name: BR-40c "Turtle"
  description: A two-handed and heavy energy barrier with extremely low passive energy consumption. Can be tethered with a multitool.
  components:
  - type: Sprite
    sprite: _Orion/Objects/Shields/EnergyDome/reinhardt.rsi
    layers:
    - state: icon
  - type: InteractionOutline
  - type: MultiHandedItem
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.25,-0.25,0.25,0.25"
        density: 20
        mask:
        - ItemMask
        restitution: 0.3
        friction: 0.2
  - type: Item
    size: Ginormous
  - type: HeldSpeedModifier
    walkModifier: 0.7
    sprintModifier: 0.7
  - type: ContainerContainer
    containers:
      cell_slot: !type:ContainerSlot
  - type: PowerCellSlot
    cellSlotId: cell_slot
  - type: ItemSlots
    slots:
      cell_slot:
        name: power-cell-slot-component-slot-name-default
        startingItem: PowerCellSmall
        whitelist:
          tags:
            - PowerCell
            - PowerCellSmall
  - type: EnergyDomeGenerator
    damageEnergyDraw: 8
    domePrototype: EnergyDomeMediumBlue
    canDeviceNetworkUse: true
  - type: PowerCellDraw
    enabled: false
    drawRate: 0
    useCharge: 0
  - type: UseDelay
    delay: 10.0
  - type: DeviceNetwork
    deviceNetId: Wireless
    receiveFrequencyId: BasicDevice
  - type: WirelessNetworkConnection
    range: 200
  - type: DeviceLinkSink
    ports:
    - Toggle
    - On
    - Off
