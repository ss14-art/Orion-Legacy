# Default
- type: customGhost
  id: default
  supportsDeathDamageState: true
  category: color
  proto: MobObserver

# Red
- type: customGhost
  id: red
  supportsDeathDamageState: true
  proto: MobObserverRed
  category: color
  restrictions:
  - !type:PlaytimeServerRestriction
    hoursPlaytime: 1

- type: entity
  parent: MobObserver
  id: MobObserverRed
  components:
  - type: Sprite
    sprite: Mobs/Ghosts/ghost_human.rsi
    color: "#f228"
    layers:
    - state: animated
      shader: unshaded

