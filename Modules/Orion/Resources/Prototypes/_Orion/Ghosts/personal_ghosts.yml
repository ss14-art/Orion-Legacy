- type: customGhost
  id: customPlaceholder
  supportsDeathDamageState: false # Most personal ghost doesnt support damage states
  category: personal
  proto: MobObserverCkeyPlaceholder
  restrictions:
  - !type:CkeyRestriction
    ckey: [ PuroSlavKing ]
  name: custom-ghost-personal-placeholder-name
  desc: custom-ghost-personal-placeholder-desc

- type: entity
  parent: MobObserverCkey
  id: MobObserverCkeyPlaceholder
  components:
  - type: Sprite
    sprite: _Orion/Ghosts/placeholder.rsi

- type: customGhost
  abstract: true
  id: CkeyPersonal
  category: personal
  name: custom-ghost-personal-name
  desc: custom-ghost-personal-desc

# Abstract entproto to force transparency on all custom ghosts
- type: entity
  abstract: true
  parent: MobObserver
  id: MobObserverCkey
  components:
  - type: Sprite
    color: "#ffffffcc" # 0.8 alpha

# PuroSlavKing
- type: customGhost
  parent: CkeyPersonal
  id: PuroSlavKing-ghost
  restrictions:
  - !type:CkeyRestriction
    ckey: [ PuroSlavKing ]
  proto: MobObserverPuroSlavKing

- type: entity
  parent: MobObserverCkey
  id: MobObserverPuroSlavKing
  description: Hello World!
  components:
  - type: Sprite
    sprite: _Orion/Ghosts/ckey/PuroSlavKing.rsi

